version: '3.8'

services:
  app:
    image: ghcr.io/${GITHUB_REPOSITORY}:latest
    container_name: ferreira3d_site
    networks:
      - YkaroNET
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=YkaroNET"
        - "traefik.http.routers.ferreira3d.rule=Host(`ferreira3d.com`, `www.ferreira3d.com`)"
        - "traefik.http.routers.ferreira3d.entrypoints=websecure"
        - "traefik.http.routers.ferreira3d.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.ferreira3d.loadbalancer.server.port=80"

networks:
  YkaroNET:
    external: true
